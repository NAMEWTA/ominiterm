<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>termcanvas — ASCII Logo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0a0a0a; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #root {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    pre {
      font-family: "Geist Mono", "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
      line-height: 1.1;
      color: #e4e4e7;
      user-select: none;
      cursor: default;
      font-size: 12px;
    }
    @media (max-width: 700px) {
      pre { font-size: 8px; }
    }
    @media (max-width: 500px) {
      pre { font-size: 6px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <p style="
    font-family: 'Geist Mono', monospace;
    color: #71717a;
    text-align: center;
    margin-top: 1rem;
    font-size: 14px;
    letter-spacing: 0.2em;
  ">termcanvas</p>
  <script type="module" src="./ascii-logo.js"></script>
</body>
</html>
